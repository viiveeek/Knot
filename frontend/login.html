<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNOT - Access Campus Ecosystem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-600 to-indigo-900 min-h-screen flex items-center justify-center p-4">

    <div class="glass max-w-md w-full p-8 rounded-2xl shadow-2xl border border-white/20">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-extrabold text-indigo-900 tracking-tight">KNOT</h1>
            <p class="text-indigo-600 font-medium">Untangling Campus Chaos</p>
        </div>

        <div id="email-section" class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">College Email Address</label>
                <input type="email" id="email" placeholder="name@its.edu.in" 
                    class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                <p class="text-xs text-gray-500 mt-2 italic">*Only verified @its.edu.in emails allowed.</p>
            </div>
            <button onclick="sendOTP()" id="send-btn"
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg transition-colors shadow-lg">
                Send Secure Code
            </button>
        </div>

        <div id="otp-section" class="hidden space-y-4">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Enter 6-Digit OTP</label>
                <input type="text" id="otp" maxlength="6" placeholder="000000" 
                    class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 outline-none text-center text-2xl tracking-widest">
                <p id="resend-timer" class="text-xs text-indigo-600 mt-2 text-center cursor-pointer hover:underline">Resend code in 00:59</p>
            </div>
            <button onclick="verifyOTP()"
                class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg transition-colors shadow-lg">
                Verify & Enter
            </button>
            <button onclick="resetFlow()" class="w-full text-sm text-gray-500 hover:text-gray-700">Change Email</button>
        </div>

        <div id="loader" class="hidden text-center mt-4">
            <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-indigo-600 mx-auto"></div>
        </div>
    </div>

    <script>
        const API_BASE = "https://apiknot.niksoriginals.in";

        async function sendOTP() {
            const email = document.getElementById('email').value;
            if(!email.endsWith("@its.edu.in")) {
                alert("Only, ITS college email is allowed!");
                return;
            }

            toggleLoader(true);
            try {
                const response = await fetch(`${API_BASE}/auth/send-otp`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ email: email })
                });
                const data = await response.json();
                
                if(response.ok) {
                    document.getElementById('email-section').classList.add('hidden');
                    document.getElementById('otp-section').classList.remove('hidden');
                } else {
                    alert(data.error);
                }
            } catch (err) {
                alert("Connection Error!");
            }
            toggleLoader(false);
        }

        async function verifyOTP() {
            const email = document.getElementById('email').value;
            const otp = document.getElementById('otp').value;

            try {
                const response = await fetch(`${API_BASE}/auth/verify-otp`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ email, otp })
                });
                
                if(response.ok) {
                    window.location.href = "/dashboard";
                } else {
                    alert("Invalid OTP! Retry.");
                }
            } catch (err) {
                alert("Verification Failed!");
            }
        }

        function toggleLoader(show) {
            document.getElementById('loader').classList.toggle('hidden', !show);
            document.getElementById('send-btn').disabled = show;
        }

        function resetFlow() {
            document.getElementById('email-section').classList.remove('hidden');
            document.getElementById('otp-section').classList.add('hidden');
        }
    </script>
</body>
</html>
