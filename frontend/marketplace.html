<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Knot | Campus Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-50 text-slate-900">

    <nav class="bg-white/80 backdrop-blur-md border-b border-slate-200 sticky top-0 z-50 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="/" class="flex items-center gap-2 text-xl font-bold text-blue-600">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white text-sm">K</div>
                Knot
            </a>
            <div class="flex gap-4">
                <button onclick="openPostModal()" class="px-4 py-2 bg-blue-600 text-white rounded-xl font-bold text-sm hover:shadow-lg transition">
                    + Post Item
                </button>
            </div>
        </div>
    </nav>

    <header class="max-w-7xl mx-auto px-6 py-10">
        <div class="flex flex-col md:flex-row justify-between items-end gap-6">
            <div>
                <h1 class="text-4xl font-black mb-2">Campus <span class="text-blue-600">Market</span></h1>
                <p class="text-slate-500">Buy, sell, trade, or find lost items within I.T.S College.</p>
            </div>
            <div class="flex bg-white p-1 rounded-2xl border border-slate-200 shadow-sm">
                <button class="px-6 py-2 bg-blue-600 text-white rounded-xl font-bold text-sm">All</button>
                <button class="px-6 py-2 text-slate-500 hover:text-blue-600 font-bold text-sm">Lost/Found</button>
                <button class="px-6 py-2 text-slate-500 hover:text-blue-600 font-bold text-sm">Buy/Sell</button>
                <button class="px-6 py-2 text-slate-500 hover:text-blue-600 font-bold text-sm">Services</button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 pb-20">
        <div class="grid md:grid-cols-4 gap-6">
            
            <div class="bg-white rounded-2xl overflow-hidden border border-slate-200 hover:shadow-xl transition-all duration-300 group">
                <div class="h-48 bg-slate-200 relative">
                    <span class="absolute top-3 left-3 px-3 py-1 bg-red-500 text-white text-[10px] font-bold rounded-lg uppercase tracking-wider">Lost</span>
                    <img src="https://images.unsplash.com/photo-1588872657578-7efd1f1555ed?w=500" class="w-full h-full object-cover group-hover:scale-105 transition">
                </div>
                <div class="p-5">
                    <h3 class="font-bold text-lg mb-1">Dell Laptop Charger</h3>
                    <p class="text-slate-500 text-xs mb-4"><i class="fas fa-map-marker-alt mr-1"></i> Library, 2nd Floor</p>
                    <div class="flex justify-between items-center">
                        <span class="text-blue-600 font-bold text-sm">Reward: ₹200</span>
                        <button class="px-3 py-2 bg-slate-100 hover:bg-blue-100 text-blue-600 rounded-lg text-xs font-bold transition">Contact</button>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-2xl overflow-hidden border border-slate-200 hover:shadow-xl transition-all duration-300 group">
                <div class="h-48 bg-slate-200 relative">
                    <span class="absolute top-3 left-3 px-3 py-1 bg-green-600 text-white text-[10px] font-bold rounded-lg uppercase tracking-wider">For Sale</span>
                    <img src="https://images.unsplash.com/photo-1544652478-6653e09f18a2?w=500" class="w-full h-full object-cover group-hover:scale-105 transition">
                </div>
                <div class="p-5">
                    <h3 class="font-bold text-lg mb-1">Scientific Calculator</h3>
                    <p class="text-slate-500 text-xs mb-4"><i class="fas fa-user mr-1"></i> Posted by Aryan</p>
                    <div class="flex justify-between items-center">
                        <span class="text-slate-900 font-black text-lg">₹450</span>
                        <button class="px-3 py-2 bg-blue-600 text-white rounded-lg text-xs font-bold transition">Buy Now</button>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-2xl overflow-hidden border border-slate-200 hover:shadow-xl transition-all duration-300 group">
                <div class="h-48 bg-blue-600 flex items-center justify-center text-white text-4xl p-6 text-center italic font-serif">
                    "Python Help"
                </div>
                <div class="p-5">
                    <span class="px-3 py-1 bg-purple-100 text-purple-700 text-[10px] font-bold rounded-lg uppercase mb-2 inline-block">Service/Trade</span>
                    <h3 class="font-bold text-lg mb-1">Web Dev Tutoring</h3>
                    <p class="text-slate-500 text-xs mb-4">Trading for Maths notes.</p>
                    <button class="w-full py-2 border-2 border-blue-600 text-blue-600 rounded-lg text-xs font-bold hover:bg-blue-600 hover:text-white transition">Chat to Trade</button>
                </div>
            </div>

        </div>
    </main>

    <div id="postModal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm hidden items-center justify-center z-[100] p-6">
        <div class="bg-white w-full max-w-lg rounded-3xl p-8 shadow-2xl">
            <h2 class="text-2xl font-bold mb-6">List an <span class="text-blue-600">Item</span></h2>
            <form class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold mb-1">Type</label>
                        <select class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-400">
                            <option>Lost</option>
                            <option>Found</option>
                            <option>Sell</option>
                            <option>Service/Trade</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1">Price/Reward</label>
                        <input type="text" placeholder="e.g. 500" class="w-full p-3 border rounded-xl outline-none">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-1">Item Title</label>
                    <input type="text" placeholder="What are you listing?" class="w-full p-3 border rounded-xl outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-1">Description</label>
                    <textarea rows="3" class="w-full p-3 border rounded-xl outline-none"></textarea>
                </div>
                <button type="submit" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-bold hover:bg-blue-700 transition">Post Listing</button>
                <button type="button" onclick="closePostModal()" class="w-full text-slate-400 text-sm">Cancel</button>
            </form>
        </div>
    </div>

    <script>
        function openPostModal() { document.getElementById('postModal').classList.remove('hidden'); document.getElementById('postModal').classList.add('flex'); }
        function closePostModal() { document.getElementById('postModal').classList.add('hidden'); document.getElementById('postModal').classList.remove('flex'); }
    </script>
</body>
</html>
