<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNOT | Lost & Found Ledger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #020617;
            color: #f8fafc;
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .post-card {
            transition: all 0.3s ease;
        }

        .post-card:hover {
            border-color: #3b82f6;
            transform: translateY(-2px);
        }
    </style>
</head>

<body class="min-h-screen">

    <nav class="sticky top-0 z-50 bg-slate-950/80 backdrop-blur-md border-b border-white/5 px-8 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4 cursor-pointer" onclick="location.href='/dashboard'">
                <div
                    class="w-9 h-9 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg text-white font-bold italic">
                    K</div>
                <span class="text-xl font-black tracking-tighter uppercase italic">KNOT <span
                        class="text-indigo-500 text-sm">Ledger</span></span>
            </div>
            <button onclick="openPostModal()"
                class="bg-indigo-600 hover:bg-indigo-500 px-5 py-2 rounded-xl text-xs font-black uppercase tracking-widest transition-all">Report
                Item</button>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-8 py-12">
        <header class="mb-12">
            <h1 class="text-4xl font-black text-white tracking-tight mb-2">Lost & Found</h1>
            <p class="text-slate-500 font-medium italic">Peer-to-peer tracking for misplaced campus assets.</p>
        </header>

        <div id="marketplace-feed" class="space-y-4">
            <div class="p-20 text-center text-slate-600 animate-pulse">Syncing with Marketplace Ledger...</div>
        </div>
    </main>

    <div id="post-modal"
        class="fixed inset-0 bg-black/90 backdrop-blur-sm hidden flex items-center justify-center z-[100] p-6">
        <div class="glass-panel p-8 w-full max-w-md rounded-[2.5rem] border-t-2 border-indigo-500">
            <h3 class="text-2xl font-black mb-6 uppercase italic">Report New Entry</h3>
            <div class="space-y-4">
                <div>
                    <label class="text-[9px] font-black uppercase text-slate-500 ml-1">Entry Type</label>
                    <select id="post-type"
                        class="w-full bg-slate-900 border border-white/10 p-4 rounded-2xl text-white outline-none focus:border-indigo-500 mt-1">
                        <option value="Lost">I Lost Something</option>
                        <option value="Found">I Found Something</option>
                    </select>
                </div>
                <div>
                    <label class="text-[9px] font-black uppercase text-slate-500 ml-1">Item Title</label>
                    <input type="text" id="post-title" placeholder="Ex: Blue Water Bottle"
                        class="w-full bg-slate-900 border border-white/10 p-4 rounded-2xl text-white outline-none focus:border-indigo-500 mt-1">
                </div>
                <div>
                    <label class="text-[9px] font-black uppercase text-slate-500 ml-1">Description / Location</label>
                    <textarea id="post-desc" rows="3" placeholder="Where did you see it? Contact details?"
                        class="w-full bg-slate-900 border border-white/10 p-4 rounded-2xl text-white outline-none focus:border-indigo-500 mt-1"></textarea>
                </div>
                <div class="flex gap-3 pt-4">
                    <button onclick="closePostModal()"
                        class="flex-1 text-slate-500 font-bold uppercase text-[10px]">Cancel</button>
                    <button onclick="submitPost()"
                        class="flex-[2] bg-indigo-600 py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl shadow-indigo-600/20">Broadcast
                        Entry</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "https://apiknot.niksoriginals.in";

        function openPostModal() { document.getElementById('post-modal').classList.remove('hidden'); }
        function closePostModal() { document.getElementById('post-modal').classList.add('hidden'); }

        async function fetchFeed() {
            try {
                const res = await fetch(`${API_BASE}/api/marketplace?category=lostfound`, { credentials: 'include' });
                const items = await res.json();
                renderFeed(items);
            } catch (e) { console.error(e); }
        }

        function renderFeed(items) {
            const feed = document.getElementById('marketplace-feed');
            if (items.length === 0) {
                feed.innerHTML = `<div class="p-20 text-center text-slate-600 italic">No entries found in the ledger.</div>`;
                return;
            }

            feed.innerHTML = items.map(i => `
                <div class="post-card glass-panel p-6 rounded-3xl flex justify-between items-start gap-6 border-l-4 ${i.type === 'Lost' ? 'border-l-rose-500' : 'border-l-emerald-500'}">
                    <div class="flex-1">
                        <div class="flex items-center gap-3 mb-2">
                            <span class="px-2 py-0.5 rounded-md text-[8px] font-black uppercase tracking-tighter ${i.type === 'Lost' ? 'bg-rose-500/10 text-rose-400' : 'bg-emerald-500/10 text-emerald-400'}">
                                ${i.type}
                            </span>
                            <span class="text-[9px] text-slate-500 font-bold">${i.created_at}</span>
                        </div>
                        <h3 class="text-xl font-bold text-white uppercase tracking-tight">${i.title}</h3>
                        <p class="text-sm text-slate-400 mt-2 line-clamp-2">${i.description}</p>
                        <p class="text-[10px] text-indigo-400 font-black mt-4 uppercase tracking-widest"><i class="fas fa-user-circle mr-1"></i> Posted by: ${i.owner_name}</p>
                    </div>
                    <div class="w-12 h-12 rounded-2xl bg-white/5 flex items-center justify-center text-slate-500">
                        <i class="fas ${i.type === 'Lost' ? 'fa-search' : 'fa-hand-holding-heart'} text-xl"></i>
                    </div>
                </div>
            `).join('');
        }

        async function submitPost() {
            const title = document.getElementById('post-title').value;
            const desc = document.getElementById('post-desc').value;
            const type = document.getElementById('post-type').value;

            if (!title || !desc) return alert("All fields are mandatory.");

            const res = await fetch(`${API_BASE}/api/marketplace/add`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ title, description: desc, type })
            });

            if (res.ok) {
                location.reload();
            } else {
                alert("Broadcast Failure.");
            }
        }

        window.onload = fetchFeed;
    </script>
</body>

</html>
